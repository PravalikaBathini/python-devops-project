apiVersion: v1
kind: Service
metadata:
  name: python-service
spec:
  type: NodePort                       # Exposes the service on each node's IP
  selector:
    app: python-devops-app             # Must match the deployment label
  ports:
  - protocol: TCP
    port: 80                           # Port the service listens on
    targetPort: 5000                   # Port the container listens on
    nodePort: 30080                    # External port on the Minikube s