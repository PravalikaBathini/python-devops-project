name: CI/CD Pipeline — Python DevOps App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/python-devops-app

jobs:
  # ─────────────────────────────────────────
  # Job 1: Run tests and code quality checks
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # Job 2: Build and push Docker image
  # Runs only after tests pass
  # ─────────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test                          # Only runs if 'test' job succeeds
    if: github.ref == 'refs/heads/main'  # Only on pushes to main branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest summary
        run: echo "Image pushed with tags latest and ${{ github.sha }}"

  # ─────────────────────────────────────────
  # Job 3: Notify on completion
  # ─────────────────────────────────────────
  notify:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: always()

    steps:
      - name: Print pipeline result
        run: |
          echo "Tests result:      ${{ needs.test.result }}"
          echo "Build/push result: ${{ needs.build-and-push.result }}"
          echo "Commit SHA:        ${{ github.sha }}"
          echo "Branch:            ${{ github.ref_name }}"
          