name: CI/CD Pipeline — Python DevOps App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────
  # Job 1: Test (runs on GitHub cloud)
  # ─────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ─────────────────────────────
  # Job 2: Build and Push Docker image (runs on GitHub cloud)
  # ─────────────────────────────
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/python-devops-app:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/python-devops-app:latest

  # ─────────────────────────────
  # Job 3: Deploy to Minikube (runs on YOUR machine)
  # ─────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted          # ← runs on your local machine
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Minikube is running
        run: minikube status

      - name: Set kubectl context to Minikube
        run: kubectl config use-context minikube

      - name: Deploy to Minikube
        run: kubectl apply -f k8s/

      - name: Update image to latest
        run: |
          kubectl set image deployment/python-devops-app `
            python-devops-app=${{ secrets.DOCKER_USERNAME }}/python-devops-app:latest

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/python-devops-app --timeout=120s

      - name: Show running pods
        run: kubectl get pods

      - name: Show service URL
        run: minikube service python-service --url

      - name: Show service URL
        run: |
          kubectl get svc python-service
          echo "Access your app at: http://$(minikube ip):30080"
